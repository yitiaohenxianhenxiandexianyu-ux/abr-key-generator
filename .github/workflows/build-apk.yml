name: 生成 APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 准备网页文件
        run: |
          mkdir www
          cp index.html style.css app.js md5-lib.js manifest.json sw.js icon-192.png icon-512.png www/

      - name: 用 Capacitor 构建 APK
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "阿搏锐密钥" "com.abr.keygen" --web-dir=www
          npx cap add android
          cd android
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 阿搏锐密钥生成器
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
