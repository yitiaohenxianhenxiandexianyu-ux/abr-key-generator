<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ABERUI维护工具</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="阿搏锐密钥生成">
</head>
<body>

  <!-- ==================== 登录页面 ==================== -->
  <div id="loginPage" class="page" style="display:none">
    <div class="login-container">
      <div class="login-card">
        <div class="login-icon">🔐</div>
        <h2>首次验证</h2>
        <div class="input-group">
          <label>账&nbsp;&nbsp;&nbsp;号</label>
          <input type="text" id="loginAccount" placeholder="请输入账号" autocomplete="off">
        </div>
        <div class="input-group">
          <label>验证码</label>
          <input type="text" id="loginCode" placeholder="请输入验证码" autocomplete="off">
        </div>
        <button id="loginBtn" class="btn-calc">登 录</button>
        <div class="error-msg" id="loginError"></div>
      </div>
    </div>
  </div>

  <!-- ==================== 主页面 ==================== -->
  <div id="mainPage" class="page">

    <div class="header">
      <h1>🔐 ABERUI维护工具</h1>
      <div class="version-bar" id="versionBar"></div>
    </div>

    <div class="card">
      <input type="hidden" id="keyK" value="26070199">

      <div class="input-group">
        <label>厂商代码 M</label>
        <input type="text" id="keyM" placeholder="请输入厂商代码" autocomplete="off">
      </div>

      <div class="input-group">
        <label>设备唯一码 D</label>
        <input type="text" id="keyD" placeholder="请输入设备唯一码" autocomplete="off">
      </div>

      <div class="input-group">
        <label>设备当前日期 <span class="hint">(维护画面获取)</span></label>
        <div class="date-row">
          <input type="text" id="devYY" placeholder="YY" maxlength="2" class="date-part">
          <span class="date-sep">年</span>
          <input type="text" id="devMM" placeholder="MM" maxlength="2" class="date-part">
          <span class="date-sep">月</span>
          <input type="text" id="devDD" placeholder="DD" maxlength="2" class="date-part">
          <span class="date-sep">日</span>
          <div class="date-cal-wrap">
            <input type="date" id="deviceDateCal" class="date-cal">
          </div>
        </div>
      </div>

      <!-- 模式选择 -->
      <div class="mode-tabs">
        <button id="modeNormal" class="mode-tab active">📅 普通分期</button>
        <button id="modeMulti" class="mode-tab">📋 多次分期</button>
        <button id="modeSuper" class="mode-tab">🔓 超级密码</button>
        <button id="modeUpdate" class="mode-tab">🔄 密钥更新</button>
      </div>

      <!-- 条件输入：普通分期 → 日期选择器 -->
      <div class="input-group" id="dateGroup">
        <label>到期时间</label>
        <div class="date-row">
          <input type="text" id="expYY" placeholder="YY" maxlength="2" class="date-part">
          <span class="date-sep">年</span>
          <input type="text" id="expMM" placeholder="MM" maxlength="2" class="date-part">
          <span class="date-sep">月</span>
          <input type="text" id="expDD" placeholder="DD" maxlength="2" class="date-part">
          <span class="date-sep">日</span>
          <div class="date-cal-wrap">
            <input type="date" id="expireDateCal" class="date-cal">
          </div>
        </div>
      </div>

      <!-- 条件输入：密钥更新 → 新密钥 -->
      <div class="input-group" id="newKeyGroup" style="display:none">
        <label>新密钥 K_new <span class="hint">(16位数字)</span></label>
        <input type="text" id="newKey" placeholder="请输入新密钥" maxlength="16" autocomplete="off">
      </div>

      <!-- 条件输入：多次分期 -->
      <div id="multiGroup" style="display:none">
        <div class="input-group">
          <label>首期日期</label>
          <div class="date-row">
            <input type="text" id="multiYY" placeholder="YY" maxlength="2" class="date-part">
            <span class="date-sep">年</span>
            <input type="text" id="multiMM" placeholder="MM" maxlength="2" class="date-part">
            <span class="date-sep">月</span>
            <input type="text" id="multiDD" placeholder="DD" maxlength="2" class="date-part">
            <span class="date-sep">日</span>
            <div class="date-cal-wrap">
              <input type="date" id="multiDateCal" class="date-cal">
            </div>
          </div>
        </div>
        <div class="input-group">
          <label>每期间隔</label>
          <div class="interval-row">
            <input type="number" id="intervalNum" placeholder="1" min="1" max="99" value="1" class="interval-num">
            <select id="intervalUnit" class="interval-unit">
              <option value="month">月</option>
              <option value="day">日</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>期数 <span class="hint">(最大12期)</span></label>
          <input type="number" id="periodCount" placeholder="期数" min="1" max="12" value="1">
        </div>
      </div>

      <!-- 计算按钮 -->
      <button id="calcBtn" class="btn-calc">生成分期密码</button>

      <!-- 输出区域：单密码 -->
      <div class="output-area" id="outputArea">
        <div class="output-row" id="singleOutput">
          <span class="output-label" id="passwordLabel">分期密码</span>
          <span class="output-value" id="password">----</span>
          <button class="btn-copy" id="copyPwd" title="复制">📋</button>
        </div>
        <div class="verify-hint" id="verifyHint"></div>
        <!-- 多次分期输出列表 -->
        <div id="multiOutput" style="display:none"></div>
      </div>

      <!-- 错误提示 -->
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-nav">
      <button id="historyBtn" class="btn-history">📋 查看历史记录</button>
    </div>

  </div>

  <!-- ==================== 历史记录页面 ==================== -->
  <div id="historyPage" class="page">
    <div class="header">
      <button id="backBtn" class="btn-back">← 返回</button>
      <h1>历史记录</h1>
      <button id="clearBtn" class="btn-clear">清空</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-hint">暂无记录</div>
    </div>
  </div>

  <!-- ==================== Toast ==================== -->
  <!-- (动态创建) -->

  <script src="md5-lib.js"></script>
  <script src="app.js"></script>

  <!-- 注册 Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function() {
        console.log('Service Worker 注册成功');
      }).catch(function(err) {
        console.log('Service Worker 注册失败:', err);
      });
    }
  </script>
</body>
</html>
