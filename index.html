<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>阿搏锐密钥工具</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="阿搏锐密钥生成">
</head>
<body>

  <!-- ==================== 主页面 ==================== -->
  <div id="mainPage" class="page active">

    <div class="header">
      <h1>🔐 阿搏锐密钥工具</h1>
    </div>

    <!-- 参数设置面板 -->
    <div class="settings-bar">
      <button id="settingsToggle" class="btn-settings">⚙️ 参数设置 ▼</button>
      <div id="settingsPanel" class="settings-panel">
        <div class="input-group">
          <label>主密钥 K <span class="hint">(8~16位数字)</span></label>
          <input type="text" id="keyK" placeholder="请输入主密钥" maxlength="16" autocomplete="off">
        </div>

        <!-- 厂商代码：选择 + 手输 -->
        <div class="input-group">
          <label>厂商代码 M</label>
          <div class="combo-input">
            <select id="vendorSelect">
              <option value="">-- 选择厂商 --</option>
            </select>
            <input type="text" id="keyM" placeholder="或手动输入代码" autocomplete="off">
          </div>
          <button id="vendorMgmtBtn" class="btn-link">🏭 管理厂商</button>
        </div>
      </div>
    </div>

    <div class="card">
      <!-- 设备唯一码 -->
      <div class="input-group">
        <label>设备唯一码 D</label>
        <input type="text" id="keyD" placeholder="请输入设备唯一码" autocomplete="off">
      </div>

      <!-- 模式选择 -->
      <div class="mode-tabs">
        <button id="modeNormal" class="mode-tab active">📅 普通分期</button>
        <button id="modeSuper" class="mode-tab">🔓 超级密码</button>
        <button id="modeUpdate" class="mode-tab">🔄 密钥更新</button>
      </div>

      <!-- 条件输入：普通分期 → 日期选择器 -->
      <div class="input-group" id="dateGroup">
        <label>到期时间</label>
        <input type="date" id="expireDate">
      </div>

      <!-- 条件输入：密钥更新 → 新密钥 -->
      <div class="input-group" id="newKeyGroup" style="display:none">
        <label>新密钥 K_new <span class="hint">(16位数字)</span></label>
        <input type="text" id="newKey" placeholder="请输入新密钥" maxlength="16" autocomplete="off">
      </div>

      <!-- 计算按钮 -->
      <button id="calcBtn" class="btn-calc">生成分期密码</button>

      <!-- 输出区域 -->
      <div class="output-area" id="outputArea">
        <div class="output-row">
          <span class="output-label" id="passwordLabel">分期密码</span>
          <span class="output-value" id="password">----</span>
          <button class="btn-copy" id="copyPwd" title="复制">📋</button>
        </div>
        <div class="verify-hint" id="verifyHint"></div>
      </div>

      <!-- 错误提示 -->
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-nav">
      <button id="historyBtn" class="btn-history">📋 查看历史记录</button>
    </div>

  </div>

  <!-- ==================== 历史记录页面 ==================== -->
  <div id="historyPage" class="page">
    <div class="header">
      <button id="backBtn" class="btn-back">← 返回</button>
      <h1>历史记录</h1>
      <button id="clearBtn" class="btn-clear">清空</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-hint">暂无记录</div>
    </div>
  </div>

  <!-- ==================== 厂商管理页面 ==================== -->
  <div id="vendorPage" class="page">
    <div class="header">
      <button id="vendorBackBtn" class="btn-back">← 返回</button>
      <h1>🏭 厂商管理</h1>
    </div>

    <div class="card">
      <!-- 新增厂商 -->
      <div class="section-title">➕ 新增厂商</div>
      <div class="input-group">
        <label>厂商名称</label>
        <input type="text" id="vendorName" placeholder="请输入厂商名称" autocomplete="off">
      </div>
      <div class="input-group">
        <label>厂商代码</label>
        <input type="text" id="vendorCode" placeholder="请输入厂商代码" autocomplete="off">
      </div>
      <div class="input-group">
        <label>备注</label>
        <input type="text" id="vendorNote" placeholder="(可选)备注" autocomplete="off">
      </div>
      <button id="vendorAddBtn" class="btn-calc">保存厂商</button>
      <div class="error-msg" id="vendorError"></div>
    </div>

    <!-- 厂商列表 -->
    <div class="card" style="margin-top:0">
      <div class="section-title">📋 已保存的厂商</div>
      <div class="vendor-list" id="vendorList">
        <div class="empty-hint">暂无厂商，请新增</div>
      </div>
    </div>
  </div>

  <!-- ==================== Toast ==================== -->
  <!-- (动态创建) -->

  <script src="md5-lib.js"></script>
  <script src="app.js"></script>

  <!-- 注册 Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function() {
        console.log('Service Worker 注册成功');
      }).catch(function(err) {
        console.log('Service Worker 注册失败:', err);
      });
    }
  </script>
</body>
</html>
